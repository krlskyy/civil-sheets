<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Таблицы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================================
     Экран пароля
     ============================================================ -->
<div id="lock-screen">
  <form class="lock-card" id="lock-form">
    <svg class="lock-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="4" y="10" width="16" height="10" rx="2"/>
      <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
    </svg>
    <h1>Таблицы</h1>
    <p>Введите пароль для доступа</p>
    <input type="password" id="lock-password" placeholder="Пароль" autocomplete="current-password" autofocus>
    <div class="lock-error" id="lock-error"></div>
    <button type="submit" class="btn-gold">Войти</button>
  </form>
</div>

<!-- ============================================================
     Приложение
     ============================================================ -->
<div id="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
      </svg>
      <span>Таблицы</span>
    </div>

    <div class="sidebar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" id="search-input" placeholder="Поиск таблиц…">
    </div>

    <button class="sidebar-new-btn" id="new-sheet-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
      Новая таблица
    </button>

    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <div class="main-area" id="main-area">
    <!-- Контент подставляется через JS: либо empty-state, либо редактор -->
  </div>

  <nav class="bottom-tabbar">
    <button id="tab-sheets" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      Таблицы
    </button>
    <button id="tab-new">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Новая
    </button>
  </nav>
</div>

<!-- ============================================================
     Шаблоны модалок (клонируются через JS)
     ============================================================ -->

<template id="tpl-modal-prompt">
  <div class="modal-overlay">
    <div class="modal-card">
      <h3 class="modal-title"></h3>
      <p class="modal-subtitle"></p>
      <input type="text" class="modal-input">
      <div class="modal-actions">
        <button class="btn-ghost modal-cancel">Отмена</button>
        <button class="btn-gold modal-confirm" style="width:auto;">Сохранить</button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-modal-confirm">
  <div class="modal-overlay">
    <div class="modal-card">
      <h3 class="modal-title"></h3>
      <p class="modal-subtitle"></p>
      <div class="modal-actions">
        <button class="btn-ghost modal-cancel">Отмена</button>
        <button class="btn-danger modal-confirm">Удалить</button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-dropdown">
  <div class="dropdown-menu"></div>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
